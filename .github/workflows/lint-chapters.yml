name: Lint chapters

on:
  push:
    paths:
      - "chapters/**.qmd"
      - "scripts/lint-chapters.py"
      - ".github/workflows/lint-chapters.yml"
  pull_request:
    paths:
      - "chapters/**.qmd"
      - "scripts/lint-chapters.py"
      - ".github/workflows/lint-chapters.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint chapter hygiene
        run: python scripts/lint-chapters.py
