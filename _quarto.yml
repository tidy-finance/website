project:
  type: website
  output-dir: docs
  execute-dir: project
  # Legacy pandas archive (#258): copied verbatim into docs/legacy-python-pandas/
  # without rendering/indexing. Run scripts/build-legacy-archive.py first.
  resources:
    - legacy-python-pandas
    # Redirect stubs for the blog, which moved to blog.tidy-finance.org.
    # Old /blog.html and /blog/<slug>/ URLs now forward to the new host.
    - blog.html
    - blog

bibliography:
  - assets/bib/book.bib
  - assets/bib/packages-r.bib
  - assets/bib/packages-python.bib
biblio-style: apalike
link-citations: true
links-as-notes: true

execute:
  freeze: auto
  eval: true
  echo: true
  warning: true
  message: false
  cache: false

format:
  html:
    theme:
      light: [cosmo, assets/scss/theme-light.scss]
    css: assets/css/global.css
    toc: true
    section-divs: true
    number-sections: false
    embed-resources: false
    anchor-sections: true
    smooth-scroll: true
    link-external-icon: false
    link-external-newwindow: true
    link-external-filter: '^(?:http:|https:)\/\/www\.tidy-finance\.org'
    citations-hover: true
    footnotes-hover: true
    code-link: false
    fig-align: "center"
    fig-width: 7
    fig-height: 5
    fig-dpi: 300
    lightbox: auto
    include-after-body:
      - assets/html/footer.html

website:
  title: "Tidy Finance"
  llms-txt: true
  site-url: https://www.tidy-finance.org
  image: assets/img/cover.png
  repo-url: https://github.com/tidy-finance/website
  repo-actions: source
  description: "An opinionated approach on empirical research in financial economics"
  favicon: assets/img/favicon.png
  open-graph: true
  page-navigation: true
  bread-crumbs: false
  google-analytics:
    tracking-id: "G-DH3KZSMJ5W"
    anonymze-ip: true
  cookie-consent:
    type: express
    style: interstitial
    palette: light
  navbar:
    logo: assets/img/logo-website-white.png
    logo-href: https://www.tidy-finance.org
    pinned: false
    left:
      - href: chapters/index.qmd
        text: Chapters
      - href: https://blog.tidy-finance.org
        text: Blog
      - href: support.qmd
        text: Support
      - href: workshops/reproducible-research-workflows.qmd
        text: Workshops
  sidebar:
    - id: tidy-finance
      style: "floating"
      search: true
      collapse-level: 0
      pinned: true
      contents:
        - href: chapters/index.qmd
          text: Preface
        - section: "Prerequisites"
          contents:
            - chapters/setting-up-your-environment.qmd
            - chapters/the-tidyfinance-package.qmd
        - section: "Getting Started"
          contents:
            - chapters/working-with-stock-returns.qmd
            - chapters/modern-portfolio-theory.qmd
            - chapters/capital-asset-pricing-model.qmd
            - chapters/financial-statement-analysis.qmd
            - chapters/discounted-cash-flow-analysis.qmd
        - section: "Financial Data"
          contents:
            - chapters/accessing-and-managing-financial-data.qmd
            - chapters/wrds-crsp-and-compustat.qmd
            - chapters/trace-and-fisd.qmd
            - chapters/other-data-providers.qmd
        - section: "Asset Pricing"
          contents:
            - chapters/beta-estimation.qmd
            - chapters/univariate-portfolio-sorts.qmd
            - chapters/size-sorts-and-p-hacking.qmd
            - chapters/value-and-bivariate-sorts.qmd
            - chapters/replicating-fama-and-french-factors.qmd
            - chapters/fama-macbeth-regressions.qmd
        - section: "Modeling and Machine Learning"
          contents:
            - chapters/fixed-effects-and-clustered-standard-errors.qmd
            - chapters/difference-in-differences.qmd
            - chapters/factor-selection-via-machine-learning.qmd
            - chapters/option-pricing-via-machine-learning.qmd
        - section: "Portfolio Optimization"
          contents:
            - chapters/parametric-portfolio-policies.qmd
            - chapters/constrained-optimization-and-backtesting.qmd
        - section: "Appendix"
          contents:
            - chapters/wrds-dummy-data.qmd
            - chapters/cover-and-logo-design.qmd
            - chapters/clean-enhanced-trace.qmd
            - chapters/proofs.qmd
            - chapters/colophon.qmd
            - chapters/changelog.qmd
      
editor: source
